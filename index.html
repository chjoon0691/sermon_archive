<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 스마트 설교 아카이브</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .view-list { grid-template-columns: 1fr; }
        .view-grid { grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <div class="max-w-5xl mx-auto p-4 md:p-8">
        <!-- 상단 헤더 영역 -->
        <header class="bg-white p-8 rounded-2xl shadow-sm border border-gray-200 mb-6">
            <div class="flex justify-between items-center">
                <div>
                    <h1 class="text-2xl font-bold text-gray-800 flex items-center gap-2">
                        📖 AI 스마트 설교 아카이브
                    </h1>
                    <p class="text-gray-500 text-sm mt-1">AI 기반 설교 분석 및 주제별 예화 자산 관리 시스템</p>
                </div>
                <button class="text-sm bg-gray-100 hover:bg-gray-200 px-4 py-2 rounded-lg font-medium">Gemini API 키 설정</button>
            </div>
        </header>

        <!-- 새로운 설교 등록 영역 -->
        <section class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200 mb-8">
            <h2 class="text-md font-bold mb-4 flex items-center gap-2">✨ 새로운 설교 등록 및 AI 자동 분석</h2>
            <div class="flex gap-2">
                <input type="text" id="urlInput" placeholder="유튜브 설교 영상 주소를 입력하세요." class="flex-1 p-3 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
                <button onclick="analyzeSermon()" class="bg-indigo-700 text-white px-6 py-3 rounded-lg font-bold text-sm hover:bg-indigo-800 transition">AI 설교 분석 시작</button>
            </div>
        </section>

        <!-- 정렬 및 보기 전환 컨트롤 -->
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-lg font-bold text-gray-700">분석된 설교문 리스트</h3>
            <div class="flex bg-white border border-gray-300 rounded-lg overflow-hidden shadow-sm">
                <button onclick="setView('grid')" id="gridBtn" class="px-4 py-2 bg-indigo-50 text-indigo-700 font-bold border-r border-gray-300 text-sm">바둑판</button>
                <button onclick="setView('list')" id="listBtn" class="px-4 py-2 text-gray-600 hover:bg-gray-50 text-sm">리스트</button>
            </div>
        </div>

        <!-- 설교 리스트 컨테이너 -->
        <div id="sermonContainer" class="grid gap-6 transition-all duration-300 view-grid">
            <!-- 샘플 카드 -->
            <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm hover:shadow-md transition">
                <div class="text-xs text-indigo-600 font-bold mb-2">2026-05-26 | 요한일서 4:11-12</div>
                <h4 class="text-md font-bold mb-2">유튜브 분석 성공: 십자가의 참된 사랑</h4>
                <p class="text-gray-600 text-sm mb-4">세상 속에서 그리스도의 무조건적인 사랑을 받은 우리가...</p>
                <div class="flex gap-2">
                    <span class="bg-gray-100 text-gray-700 px-2 py-1 rounded text-[10px]">#사랑</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 보기 전환 기능
        function setView(view) {
            const container = document.getElementById('sermonContainer');
            const gridBtn = document.getElementById('gridBtn');
            const listBtn = document.getElementById('listBtn');

            if (view === 'list') {
                container.classList.remove('view-grid');
                container.classList.add('view-list');
                listBtn.className = "px-4 py-2 bg-indigo-50 text-indigo-700 font-bold text-sm";
                gridBtn.className = "px-4 py-2 text-gray-600 hover:bg-gray-50 border-r border-gray-300 text-sm";
            } else {
                container.classList.remove('view-list');
                container.classList.add('view-grid');
                gridBtn.className = "px-4 py-2 bg-indigo-50 text-indigo-700 font-bold border-r border-gray-300 text-sm";
                listBtn.className = "px-4 py-2 text-gray-600 hover:bg-gray-50 text-sm";
            }
        }

        // 분석 함수 (오류 해결용)
        function analyzeSermon() {
            const url = document.getElementById('urlInput').value;
            if (!url) {
                alert("유튜브 주소를 입력해주세요.");
                return;
            }
            alert("분석을 시작합니다: " + url);
        }
    </script>
</body>
</html>
